spring:
  application:
    name: hi-locf
  datasource:
    driver-class-name: oracle.jdbc.OracleDriver
    url: jdbc:oracle:thin:@//127.0.0.1:1521/XEPDB1
    username: LOCF_USER
    password: hdmf1412!!
    hikari:
      pool-name: HiLocfHikariPool
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 300000
      connection-timeout: 30000
      validation-timeout: 5000
  jackson:
    time-zone: Asia/Seoul
    serialization:
      write-dates-as-timestamps: false

mybatis:
  mapper-locations: classpath:/mapper/locf/*.xml
  configuration:
    map-underscore-to-camel-case: true
    jdbc-type-for-null: 'NULL'

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /hi-locf
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always

app:
  api:
    version: v1
  batch:
    seed-contract-count: 3
  cors:
    allowed-origins:
      - http://localhost:8080
      - http://localhost:3000
  websquare:
    mode: separate
    base-url: http://localhost:8080
    timeout-millis: 10000

logging:
  level:
    com.hi.locf: INFO
